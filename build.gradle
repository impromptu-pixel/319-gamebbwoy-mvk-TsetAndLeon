plugins {
	id 'java'
}

repositories {
	mavenCentral()
}

group = 'ch.bbw'
version = '0.0.0-SNAPSHOT'

test {
	useJUnitPlatform()
}

dependencies {
	testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
	testImplementation 'org.assertj:assertj-core:3.27.7'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}
